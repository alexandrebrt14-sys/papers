name: Weekly Fictional Calibration

# Roda 1x por semana com INCLUDE_FICTIONAL_ENTITIES=true para calibrar
# o false-positive rate (specificity) do detector. Sem isso, todas as
# 6.568 rows históricas têm fictional_hit=0 e 100% specificity reportado
# sem replicação metodológica — crítico para revisor do Paper 1.
#
# Frequência: domingo 10h BRT (13:00 UTC), não colide com daily (9h/21h UTC).
# Custo estimado: +~30 queries × 5 LLMs × 4 verticais = 600 calls extras/semana.

on:
  schedule:
    - cron: '0 13 * * 0'   # Domingo 10:00 BRT
  workflow_dispatch: {}

concurrency:
  group: papers-calibration
  cancel-in-progress: false

permissions:
  contents: write

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  INCLUDE_FICTIONAL_ENTITIES: "true"     # ativa coorte fictícia no cohort
  PAPERS_DB_PATH: data/papers.db
  FINOPS_ALERT_EMAIL: ${{ secrets.FINOPS_ALERT_EMAIL }}

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      # CRITICO (2026-06-11): restaura a base mais recente ANTES de coletar.
      # Sem este restore, a calibracao rodava sobre um papers.db VAZIO (o
      # binario saiu do git no #20/#21) e o "Persist calibration DB as artifact"
      # abaixo sobrescrevia o artifact papers-db-latest COMPARTILHADO, zerando a
      # serie historica para o proximo daily-collect. Mesmo contrato do daily:
      # artifact (safety net) + R2 (source of truth), adotando a base MAIOR.
      - name: Download previous DB (safety net)
        uses: dawidd6/action-download-artifact@v6
        with:
          name: papers-db-latest
          path: data/
          workflow_conclusion: ""
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Restore DB from Cloudflare R2 (source of truth)
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "$R2_ENDPOINT" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_BUCKET" ]; then
            echo "R2 secrets ausentes — usando apenas o artifact (skip silencioso)"
            exit 0
          fi
          pip install -q boto3
          python - <<'PY'
          import os, sqlite3, boto3
          from botocore.config import Config

          local = "data/papers.db"
          tmp = "data/_r2_latest.db"
          key = "papers/db/latest.db"

          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["R2_ENDPOINT"],
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
          )
          bucket = os.environ["R2_BUCKET"]

          try:
              s3.download_file(bucket, key, tmp)
          except Exception as e:
              print(f"R2 latest.db indisponivel ({e}) — mantendo artifact")
              raise SystemExit(0)

          def total_rows(path):
              if not os.path.exists(path):
                  return -1
              try:
                  con = sqlite3.connect(path)
                  cur = con.cursor()
                  total = 0
                  for (name,) in cur.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  ).fetchall():
                      try:
                          total += cur.execute(
                              f'SELECT COUNT(*) FROM "{name}"'
                          ).fetchone()[0]
                      except sqlite3.Error:
                          pass
                  con.close()
                  return total
              except sqlite3.Error:
                  return -1

          r_local = total_rows(local)
          r_r2 = total_rows(tmp)
          print(f"linhas artifact={r_local}  linhas R2={r_r2}")

          if r_r2 > r_local:
              os.replace(tmp, local)
              print(f"R2 e a base maior ({r_r2} linhas) — adotada como source of truth")
          else:
              if os.path.exists(tmp):
                  os.remove(tmp)
              print(f"Artifact >= R2 ({r_local} >= {r_r2}) — artifact mantido")
          PY
        continue-on-error: true

      - name: Run calibration across verticals
        run: |
          for V in fintech varejo saude tecnologia; do
            echo ""
            echo "=== Calibration ($V) — INCLUDE_FICTIONAL_ENTITIES=true ==="
            python -m src.cli --vertical "$V" collect citation || true
          done

      - name: Persist calibration DB as artifact
        # Substitui git push do data/papers.db (binario >100MB nao versionavel em git).
        # Esse artifact passa a ser a fonte de verdade entre weekly-calibration e o
        # proximo daily-collect, que faz "Download previous DB (safety net)" lendo
        # exatamente este nome.
        uses: actions/upload-artifact@v4
        with:
          name: papers-db-latest
          path: data/papers.db
          retention-days: 7
          overwrite: true
