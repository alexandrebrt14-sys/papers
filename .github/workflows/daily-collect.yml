name: Daily Data Collection

on:
  schedule:
    - cron: '0 9 * * *'  # 06:00 BRT (UTC-3)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run citation tracker (Module 1)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PAPERS_DB_PATH: data/papers.db
        run: python -m src.cli collect citation

      - name: Run competitor benchmark (Module 2)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PAPERS_DB_PATH: data/papers.db
        run: python -m src.cli collect competitor

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: papers-db-${{ github.run_number }}
          path: data/papers.db
          retention-days: 90

      - name: Commit data snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/papers.db ]; then
            # Export daily CSV for git tracking (DB is gitignored)
            python -m src.cli db export --format csv --output data/daily
            git add data/daily_*.csv 2>/dev/null || true
            git diff --cached --quiet || git commit -m "data: daily collection $(date -u +%Y-%m-%d)"
            git push
          fi
