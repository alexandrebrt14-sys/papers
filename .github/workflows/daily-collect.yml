name: Daily Data Collection + FinOps

on:
  schedule:
    - cron: '0 9 * * *'  # 06:00 BRT (UTC-3)
  workflow_dispatch:
    inputs:
      vertical:
        description: 'Vertical to collect (fintech|varejo|saude|tecnologia|all)'
        required: false
        default: 'all'

concurrency:
  group: papers-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write  # Para commit do dashboard_data.json no finalize step

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  PAPERS_DB_PATH: data/papers.db
  FINOPS_ALERT_EMAIL: ${{ secrets.FINOPS_ALERT_EMAIL }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        vertical: [fintech, varejo, saude, tecnologia]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      # Skip if workflow_dispatch selected a specific vertical
      - name: Check if vertical should run
        id: check
        run: |
          INPUT_VERTICAL="${{ github.event.inputs.vertical || 'all' }}"
          MATRIX_VERTICAL="${{ matrix.vertical }}"
          if [ "$INPUT_VERTICAL" != "all" ] && [ "$INPUT_VERTICAL" != "$MATRIX_VERTICAL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # Step 1: Restore DB from previous run (if exists)
      - name: Download previous DB
        if: steps.check.outputs.skip != 'true'
        uses: dawidd6/action-download-artifact@v6
        with:
          name: papers-db-latest
          path: data/
          if_no_artifact_found: warn
        continue-on-error: true

      # Step 2: Validate Python imports before collection (fail-fast on SyntaxError)
      - name: Validate Python imports
        if: steps.check.outputs.skip != 'true'
        run: python -c "from src.collectors.citation_tracker import CitationTracker; from src.finops.tracker import get_tracker; print('Import chain OK')"

      # Step 3: Run collectors for this vertical
      - name: Run Citation Tracker (Module 1) — ${{ matrix.vertical }}
        if: steps.check.outputs.skip != 'true'
        run: python -m src.cli --vertical ${{ matrix.vertical }} collect citation

      - name: Run Competitor Benchmark (Module 2) — ${{ matrix.vertical }}
        if: steps.check.outputs.skip != 'true'
        run: python -m src.cli --vertical ${{ matrix.vertical }} collect competitor || true

      # Step 4: Export data for this vertical
      - name: Export CSV snapshots — ${{ matrix.vertical }}
        if: steps.check.outputs.skip != 'true'
        run: python -m src.cli --vertical ${{ matrix.vertical }} db export --format csv --output data/daily
        continue-on-error: true

      # Step 5: Upload DB artifact (overwrite papers-db-latest so next vertical inherits all data)
      - name: Upload database (latest — chains across verticals)
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: papers-db-latest
          path: data/papers.db
          retention-days: 90
          overwrite: true

  finalize:
    runs-on: ubuntu-latest
    needs: collect
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      # Download DB with all 4 verticals accumulated (each vertical overwrites papers-db-latest).
      # CRITICO: usar actions/download-artifact@v4 (default = run atual) em vez de
      # dawidd6/action-download-artifact@v6, que por default busca o ULTIMO RUN COM SUCESSO
      # e por isso baixava o DB do dia anterior em vez do produzido pelos jobs collect deste
      # mesmo run — quebrava o health_check com "no such column: vertical" porque o DB
      # legacy nao tinha a migracao aplicada. Incidente: 2026-04-08 run 24129745155.
      - name: Download DB artifact (do run atual)
        uses: actions/download-artifact@v4
        with:
          name: papers-db-latest
          path: data/

      # Garantia extra: rodar a migracao do schema (adiciona coluna `vertical` se faltar)
      # antes de qualquer consumidor (sync_to_supabase, finops, health_check). Defesa em
      # profundidade caso o artifact baixado tenha schema legacy.
      - name: Aplicar migracoes do schema
        env:
          PAPERS_DB_PATH: data/papers.db
        run: |
          python -c "from src.db.client import DatabaseClient; c = DatabaseClient(); c.connect(); c.close(); print('schema migrations OK')"

      # FinOps monitor (rollup + budget check + exports + dashboard)
      - name: FinOps monitor cycle
        run: python -m src.cli finops monitor
        continue-on-error: true
        env:
          PAPERS_DB_PATH: data/papers.db
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FINOPS_ALERT_EMAIL: ${{ secrets.FINOPS_ALERT_EMAIL }}

      # Sincroniza dados agregados com o Supabase para o dashboard Next.js
      # Skip automático se as secrets não estiverem configuradas (exit code 2)
      - name: Sync to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PAPERS_DB_PATH: data/papers.db
        run: python scripts/sync_to_supabase.py

      # Gera dashboard_data.json fresco a partir do papers.db.
      # Este arquivo é consumido por alexandrecaramaschi.com/research via
      # GitHub raw + ISR (revalidate 24h) para manter o dashboard sempre atualizado
      # com os dados mais recentes da coleta diária — sem precisar de redeploy.
      - name: Generate dashboard_data.json
        run: python scripts/generate_dashboard_json.py

      # Update documentation with fresh data
      - name: Update documentation
        run: python scripts/update-docs.py

      # Commit dashboard_data.json atualizado para o repo (usado pelo /research)
      - name: Commit dashboard_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json
          if git diff --cached --quiet; then
            echo "Sem mudanças no dashboard_data.json"
          else
            git commit -m "data: atualiza dashboard_data.json [skip ci]"
            git push
          fi

      # HEALTH CHECK final — gating para garantir qualidade dos dados coletados
      # Falha o workflow (e dispara alerta WhatsApp+email) se algum check critico falhar.
      # Esta validacao previne o incidente de 30/Mar-06/Abr (12 dias de "success" sem dados).
      - name: Health check (gating)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PAPERS_DB_PATH: data/papers.db
        run: python scripts/health_check.py --min-obs-per-day 200

      # Upload final consolidated DB
      - name: Upload database (latest)
        uses: actions/upload-artifact@v4
        with:
          name: papers-db-latest
          path: data/papers.db
          retention-days: 90
          overwrite: true

      - name: Upload database (dated)
        uses: actions/upload-artifact@v4
        with:
          name: papers-db-${{ github.run_number }}
          path: data/papers.db
          retention-days: 90

      # Enviar relatório por email
      - name: Enviar relatório diário por email
        run: python scripts/send-report.py || true
        env:
          PAPERS_DB_PATH: data/papers.db
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FINOPS_ALERT_EMAIL: caramaschiai@caramaschiai.io

      # Commit everything to Git
      - name: Commit data + docs + finops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_*.csv 2>/dev/null || true
          git add data/finops_checkpoint.json 2>/dev/null || true
          git add data/finops_alerts.jsonl 2>/dev/null || true
          git add output/finops_dashboard.html 2>/dev/null || true
          git add docs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: daily collection 4 verticals $(date -u +%Y-%m-%d)"
          git push
