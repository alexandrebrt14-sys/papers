name: Daily Data Collection + FinOps

# Duas coletas por dia (2026-04-16 boost de potencia estatistica):
# - 06:00 BRT: captura estado matinal
# - 18:00 BRT: captura estado do fim do dia (testa variancia temporal)
# Dobra n/celula/dia combinado com a expansao de queries 12->35 por vertical.
on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 BRT (UTC-3)
    - cron: '0 21 * * *'  # 18:00 BRT (UTC-3)
  workflow_dispatch:
    inputs:
      vertical:
        description: 'Vertical to collect (fintech|varejo|saude|tecnologia|all)'
        required: false
        default: 'all'

concurrency:
  group: papers-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  # Onda 9 (2026-04-19): SERP overlap ativável via Brave Search. Sem
  # BRAVE_API_KEY ou com ENABLE_SERP_OVERLAP=false, SerpAIOverlap é pulado
  # silenciosamente pelo collect_all (sem custo, sem quebra).
  BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
  ENABLE_SERP_OVERLAP: ${{ vars.ENABLE_SERP_OVERLAP || 'false' }}
  PAPERS_DB_PATH: data/papers.db
  FINOPS_ALERT_EMAIL: ${{ secrets.FINOPS_ALERT_EMAIL }}

jobs:
  collect-and-finalize:
    runs-on: ubuntu-latest
    # Onda 13 (2026-04-23): ampliado de 120 para 180min para dar margem
    # extra nos primeiros dias da janela v2 (rate limits variam entre
    # provedores; 5 LLMs × 4 verticais × 48 queries × 2 retries pode
    # exceder 90min quando Gemini 2.0s/query + redes mais lentas).
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      # NOTA: papers.db agora e commitado no git como source-of-truth
      # (incidente 2026-04-16: artifact papers-db-latest "not found" causava
      # reset diario para 0 linhas; drift 255 vs 1004 na pagina publica).
      # O checkout@v4 acima ja traz a versao mais recente do DB; artifact e
      # mantido como safety-net secundario mas nao e mais source of truth.
      - name: Download previous DB (safety net)
        uses: dawidd6/action-download-artifact@v6
        with:
          name: papers-db-latest
          path: data/
          workflow_conclusion: ""
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Validate Python imports
        run: python -c "from src.collectors.citation_tracker import CitationTracker; from src.finops.tracker import get_tracker; print('Import chain OK')"

      # ================================================================
      # COLETA SEQUENCIAL — todas as verticais no MESMO job/runner
      # ================================================================
      # IMPORTANTE: antes, cada vertical rodava num job separado (matrix strategy)
      # e cada um baixava o artifact do ultimo run com SUCESSO via dawidd6/v6,
      # sobrescrevendo o artifact a cada upload. Resultado: so a ultima vertical
      # (tecnologia) sobrevivia. Agora tudo roda no mesmo runner com o MESMO
      # papers.db, eliminando o bug de chain de artifacts.
      # Incidente: 2026-04-08 a 2026-04-12 (5 dias com so 1 vertical coletada).
      # ================================================================

      - name: Determine verticals to collect
        id: verticals
        run: |
          INPUT_VERTICAL="${{ github.event.inputs.vertical || 'all' }}"
          if [ "$INPUT_VERTICAL" = "all" ]; then
            echo "list=fintech varejo saude tecnologia" >> $GITHUB_OUTPUT
          else
            echo "list=$INPUT_VERTICAL" >> $GITHUB_OUTPUT
          fi

      - name: Collect all verticals (sequential — same DB)
        run: |
          VERTICALS="${{ steps.verticals.outputs.list }}"
          FAILED_VERTICALS=""

          for V in $VERTICALS; do
            echo ""
            echo "========================================"
            echo "  Coletando vertical: $V"
            echo "========================================"

            # Module 1: Citation Tracker
            if python -m src.cli --vertical "$V" collect citation; then
              echo "[OK] $V citation collection done"
            else
              echo "[FAIL] $V citation collection failed"
              FAILED_VERTICALS="$FAILED_VERTICALS $V"
            fi

            # Module 2: Competitor Benchmark (non-blocking)
            python -m src.cli --vertical "$V" collect competitor || true

            # Module 7: Context Analyzer (non-blocking)
            # Wire 2026-04-23: antes só `collect all` rodava analyzer, mas
            # workflow usa `collect citation` — citation_context ficava vazio
            # em varejo/saude/tecnologia. Processa até 500 citations pendentes.
            python -m src.cli --vertical "$V" collect context --limit 500 || true

            # Export CSV snapshot
            python -m src.cli --vertical "$V" db export --format csv --output data/daily || true

            echo "[DONE] Vertical $V finalizada"
          done

          # Fail-loud se QUALQUER vertical falhou — coberura parcial gera
          # warnings estatisticos n<30 em celulas da vertical faltante e
          # torna a serie temporal incompleta para analise longitudinal.
          # Antes: so falhava se TODAS falhassem. Mudanca 2026-04-16.
          if [ -n "$FAILED_VERTICALS" ]; then
            TOTAL=$(echo $VERTICALS | wc -w)
            FAILED=$(echo $FAILED_VERTICALS | wc -w)
            echo "CRITICO: $FAILED/$TOTAL verticais falharam: $FAILED_VERTICALS"
            echo "Coleta incompleta invalida a serie temporal. Investigar logs acima."
            exit 1
          fi

      # Fail-loud per-LLM POS-LOOP (fix 2026-04-23 Onda 2):
      # Valida que TODOS os providers em MANDATORY_LLMS produziram rows no
      # run agregado (cross-vertical). Antes, rodava dentro de `collect citation`
      # por-vertical e mataria o bash loop antes de 2a/3a/4a vertical rodar.
      # Incidente coberto: Groq silencioso 10-22/04.
      - name: Validate run — all mandatory LLMs produced rows
        run: python -m src.cli collect validate-run --since-minutes 120

      # ================================================================
      # ARTIFACT UPLOAD INTERMEDIARIO — safety net antes do finalize.
      # Se qualquer step de finalize falhar, o DB com dados coletados
      # ja esta salvo como artifact e sera recuperado no proximo run.
      # ================================================================
      - name: Upload database (intermediate safety net)
        uses: actions/upload-artifact@v5
        with:
          name: papers-db-latest
          path: data/papers.db
          retention-days: 90
          overwrite: true

      # ================================================================
      # FINALIZE — tudo no mesmo job, sem download de artifact necessario.
      # Todos os steps de finalize usam continue-on-error para que uma
      # falha em Supabase/docs/dashboard NAO bloqueie o artifact upload
      # final nem o git commit.
      # ================================================================

      - name: Aplicar migracoes do schema
        run: python -c "from src.db.client import DatabaseClient; c = DatabaseClient(); c.connect(); c.close(); print('schema migrations OK')"

      - name: FinOps monitor cycle
        run: python -m src.cli finops monitor
        continue-on-error: true

      # CORRECAO: continue-on-error evita que exit code 2 (creds ausentes)
      # ou falha de rede no Supabase bloqueie o pipeline inteiro.
      # Incidente potencial identificado na auditoria 2026-04-12.
      - name: Sync to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/sync_to_supabase.py
        continue-on-error: true

      # CORRECAO: continue-on-error evita que DB vazio ou tabela ausente
      # (first-ever run) bloqueie os steps seguintes.
      - name: Generate dashboard_data.json
        run: python scripts/generate_dashboard_json.py
        continue-on-error: true

      - name: Update documentation
        run: python scripts/update-docs.py
        continue-on-error: true

      # ================================================================
      # GIT COMMIT + PUSH UNICO — consolida tudo em um unico push.
      # CORRECAO: antes havia 2 pushes separados (dashboard_data.json
      # primeiro, depois CSVs/docs). Se qualquer step entre eles falhava
      # ou outro workflow pushava no intervalo, o segundo push falhava
      # com "non-fast-forward". Agora tudo e commitado e pushado junto.
      # ================================================================
      - name: Commit all data + docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage tudo de uma vez
          git add data/papers.db 2>/dev/null || true   # source of truth da pesquisa (pos-incidente 16/04)
          git add data/dashboard_data.json 2>/dev/null || true
          git add data/daily_*.csv 2>/dev/null || true
          git add data/finops_checkpoint.json 2>/dev/null || true
          git add data/finops_alerts.jsonl 2>/dev/null || true
          git add output/finops_dashboard.html 2>/dev/null || true
          git add docs/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Sem mudancas para commitar"
          else
            git commit -m "data: daily collection $(date -u +%Y-%m-%d) [skip ci]"
            # Pull --rebase antes do push para absorver commits de outros workflows
            git pull --rebase origin main || true
            git push
          fi

      # ================================================================
      # ARTIFACT UPLOADS FINAIS — ANTES do health check para garantir
      # que mesmo uma falha no health check nao impede a persistencia
      # do DB consolidado. O artifact "latest" sobrescreve o intermediario
      # com a versao pos-finalize (inclui finops rollup etc).
      # ================================================================
      - name: Upload database (latest — post-finalize)
        uses: actions/upload-artifact@v5
        with:
          name: papers-db-latest
          path: data/papers.db
          retention-days: 90
          overwrite: true

      - name: Upload database (dated backup)
        uses: actions/upload-artifact@v5
        with:
          name: papers-db-${{ github.run_number }}
          path: data/papers.db
          retention-days: 90

      # Onda 6b (2026-04-23): structured JSONL logs uploaded como artifact
      # para auditoria pós-run. CollectionLogger persiste .logs/structured/*.jsonl
      # automaticamente via context manager. Retenção 30 dias.
      - name: Upload structured collection logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: structured-logs-${{ github.run_number }}
          path: .logs/structured/
          retention-days: 30
          if-no-files-found: ignore

      # Revalidar paginas publicas na Vercel imediatamente apos o commit
      # para que /research e /papers-roadmap reflitam os novos dados sem
      # esperar o TTL do ISR. Silenciosamente ignora se o secret nao estiver
      # configurado no repo.
      - name: Revalidate Vercel pages
        if: success()
        run: |
          if [ -n "${{ secrets.VERCEL_REVALIDATE_SECRET }}" ]; then
            for P in /research /papers-roadmap /roadmap; do
              curl -s -X POST "https://alexandrecaramaschi.com/api/revalidate" \
                -H "Content-Type: application/json" \
                -d "{\"secret\":\"${{ secrets.VERCEL_REVALIDATE_SECRET }}\",\"path\":\"$P\"}" \
                || echo "revalidate $P falhou (nao bloqueia)"
            done
          else
            echo "VERCEL_REVALIDATE_SECRET nao configurado — pulando revalidate"
          fi
        continue-on-error: true

      # Enviar relatorio por email (antes do health check para que o
      # relatorio saia mesmo se o check falhar)
      - name: Enviar relatorio diario por email
        run: python scripts/send-report.py || true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FINOPS_ALERT_EMAIL: ${{ secrets.FINOPS_ALERT_EMAIL }}

      # ================================================================
      # HEALTH CHECK — ultimo step. Falha dispara alertas mas NAO
      # impede artifact upload nem git commit (ambos ja rodaram acima).
      # ================================================================
      - name: Health check (gating)
        id: health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
        run: python scripts/health_check.py --min-obs-per-day 200
        continue-on-error: true

      # Alerta por email (Resend) em caso de falha de coleta ou health check.
      # Cria issue + envia email. Objetivo: publicacao cientifica julho/2026
      # exige pipeline 100% confiavel — zero tolerancia a falha silenciosa.
      - name: Alert on failure (Resend + Issue)
        if: steps.health.outcome == 'failure' || failure()
        run: |
          set +e
          if [ -n "${{ secrets.RESEND_API_KEY }}" ] && [ -n "${{ secrets.FINOPS_ALERT_EMAIL }}" ]; then
            curl -s -X POST "https://api.resend.com/emails" \
              -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"from\": \"papers-alerts@mail.brasilgeo.ai\",
                \"to\": \"${{ secrets.FINOPS_ALERT_EMAIL }}\",
                \"subject\": \"[ALERTA] Papers daily-collect falhou em $(date -u +%Y-%m-%d %H:%M)\",
                \"html\": \"<h2>Falha no pipeline Papers</h2><p>Run <a href='https://github.com/alexandrebrt14-sys/papers/actions/runs/${{ github.run_id }}'>#${{ github.run_number }}</a> teve falha de coleta ou health check.</p><p><strong>Impacto na publicacao cientifica (julho/2026):</strong> gap de dados compromete serie temporal longitudinal.</p><p>Acao imediata: abrir o run, identificar vertical/LLM faltante, re-executar workflow_dispatch.</p>\"
              }" | head -c 200
          fi
          # Tambem cria uma issue para rastreamento
          gh issue create \
            --repo alexandrebrt14-sys/papers \
            --title "daily-collect falhou em $(date -u +%Y-%m-%d)" \
            --body "Run #${{ github.run_number }} falhou. Link: https://github.com/alexandrebrt14-sys/papers/actions/runs/${{ github.run_id }}. Investigar e re-executar via workflow_dispatch." \
            --label "pipeline-failure" \
            || echo "issue creation failed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Falha o workflow DE PROPOSITO se health check falhou, para aparecer
      # vermelho no GitHub Actions e no badge da README.
      - name: Fail workflow if health check failed
        if: steps.health.outcome == 'failure'
        run: |
          echo "Health check falhou — workflow marcado como falho para alerta."
          exit 1
