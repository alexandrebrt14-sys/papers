name: Recover historical papers.db (artifacts)

# R2 nao esta configurado (secrets ausentes) — a continuidade depende SO do
# artifact papers-db-latest, que ficou vazio apos os dias de pipeline quebrado.
# Os artifacts DATADOS papers-db-<run> (retencao 90d, gravados so em runs que
# passaram do push, i.e. ate ~09/jun) ainda tem a base cheia (~6.568 linhas).
# Este workflow lista os artifacts, baixa os datados mais recentes, conta
# citations e promove o MAIS RICO para papers-db-latest. Forward-only: so
# promove se tiver MAIS linhas que o latest atual. Seguro — nunca encolhe.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Encontrar artifact datado mais rico
        id: recover
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          pip install -q requests
          mkdir -p data
          python - <<'PY'
          import os, io, zipfile, tempfile, sqlite3, requests

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          H = {"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}

          arts, page = [], 1
          while True:
              r = requests.get(
                  f"https://api.github.com/repos/{repo}/actions/artifacts",
                  headers=H, params={"per_page": 100, "page": page},
              ).json()
              items = r.get("artifacts", [])
              arts += items
              if len(items) < 100:
                  break
              page += 1
          print(f"{len(arts)} artifacts no total")

          def rows_of(a):
              try:
                  r = requests.get(a["archive_download_url"], headers=H)
                  z = zipfile.ZipFile(io.BytesIO(r.content))
                  dbname = next((n for n in z.namelist() if n.endswith(".db")), None)
                  if not dbname:
                      return -1, None
                  fd, tmp = tempfile.mkstemp(suffix=".db")
                  with os.fdopen(fd, "wb") as f:
                      f.write(z.read(dbname))
                  con = sqlite3.connect(tmp)
                  try:
                      n = con.execute("SELECT COUNT(*) FROM citations").fetchone()[0]
                  except sqlite3.Error:
                      n = 0
                  con.close()
                  return n, tmp
              except Exception as e:
                  print(f"  erro lendo {a['name']}: {e}")
                  return -1, None

          dated = [
              a for a in arts
              if a["name"].startswith("papers-db-")
              and a["name"] != "papers-db-latest"
              and not a["expired"]
          ]
          dated.sort(key=lambda a: a["created_at"], reverse=True)
          print(f"{len(dated)} artifacts datados papers-db-<run> nao expirados")

          best_rows, best_tmp, best_name = -1, None, None
          for a in dated[:8]:
              n, tmp = rows_of(a)
              print(f"  {a['name']}  {a['created_at']}  citations={n}")
              if n > best_rows:
                  if best_tmp:
                      os.remove(best_tmp)
                  best_rows, best_tmp, best_name = n, tmp, a["name"]
              elif tmp:
                  os.remove(tmp)

          latest = next(
              (a for a in arts if a["name"] == "papers-db-latest" and not a["expired"]),
              None,
          )
          latest_rows = -1
          if latest:
              latest_rows, lt = rows_of(latest)
              if lt:
                  os.remove(lt)
          print(f"\n>>> papers-db-latest atual: {latest_rows} citations")
          print(f">>> datado mais rico: {best_name} = {best_rows} citations")

          gh = os.environ.get("GITHUB_OUTPUT", os.devnull)
          with open(gh, "a") as f:
              if best_name and best_rows > latest_rows and best_rows > 0:
                  os.replace(best_tmp, "data/papers.db")
                  print(f"PROMOVENDO {best_name} ({best_rows} citations) -> papers-db-latest")
                  f.write("recovered=true\n")
                  f.write(f"rows={best_rows}\n")
                  f.write(f"source={best_name}\n")
              else:
                  if best_tmp:
                      os.remove(best_tmp)
                  print("latest ja e o mais rico (ou sem dados) — nada a promover")
                  f.write("recovered=false\n")
                  f.write(f"rows={latest_rows}\n")
          PY

      - name: Promover DB recuperado para papers-db-latest
        if: steps.recover.outputs.recovered == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: papers-db-latest
          path: data/papers.db
          retention-days: 90
          overwrite: true

      - name: Resumo
        run: |
          echo "recovered=${{ steps.recover.outputs.recovered }}  rows=${{ steps.recover.outputs.rows }}  source=${{ steps.recover.outputs.source }}"
