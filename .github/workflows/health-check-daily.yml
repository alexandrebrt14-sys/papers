name: Daily health check (papers pipeline)

# Roda 4 horas depois do daily-collect, validando que TUDO esta funcionando.
# Se houver qualquer falha critica, dispara alerta WhatsApp + email.
# Camada redundante: caso o daily-collect falhe silenciosamente, este check pega.

on:
  schedule:
    - cron: '0 13 * * *'  # 13:00 UTC = 10:00 BRT (4h apos daily-collect das 09:00 UTC)
  workflow_dispatch:

concurrency:
  group: papers-health-check
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      # Restore latest papers.db artifact (gerado pelo daily-collect)
      - name: Download papers.db artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: papers-db-latest
          path: data/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run health check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PAPERS_DB_PATH: data/papers.db
        run: python scripts/health_check.py --min-obs-per-day 200
