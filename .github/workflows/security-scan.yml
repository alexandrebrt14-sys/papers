name: Security scan (Python)

# Achado B-025 da auditoria de ecossistema 2026-04-08 (Onda 3 filtrada).
# Workflow padrao para todos os repos Python do ecossistema. Roda
# semanalmente + em PRs que tocam codigo Python ou requirements.
#
# Stack:
#   bandit         vulnerability scanner para Python (CWE coverage)
#   pip-audit      vulnerabilities em dependencias via PyPI advisory DB
#   gitleaks       secret scanning no diff
#
# Falha o job se severidade alta detectada (gating em PR).

on:
  schedule:
    - cron: "0 4 * * 1"  # toda segunda 04:00 UTC
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/security-scan.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: Bandit (Python static analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          # -r recursivo, -ll low+medium+high, -i inclui info
          # Skip B101 (assert) — usado largamente em testes
          # Skip B404/B603 (subprocess) — necessario em scripts auxiliares
          bandit -r . \
            --skip B101,B404,B603 \
            --exclude /tests,/test_,/.venv,/venv,/.tox,/build,/dist \
            -f screen \
            --severity-level medium

  pip-audit:
    name: pip-audit (vulnerable deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          # --strict: falha em qualquer vulnerabilidade
          # --ignore-vuln deixa lista vazia por enquanto
          if [ -f pyproject.toml ]; then
            pip-audit --desc || echo "pip-audit reportou findings — ver acima"
          elif [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --desc || echo "pip-audit reportou findings"
          else
            echo "Sem pyproject.toml nem requirements.txt — skip"
          fi

  gitleaks:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # historico completo para scan profundo

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Por default escaneia .env, padroes conhecidos de API keys,
        # JWT, AWS, GitHub PAT, etc.
