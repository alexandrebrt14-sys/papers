name: Weekly Benchmark & Analysis

on:
  schedule:
    - cron: '0 11 * * 0'  # Sunday 08:00 BRT (UTC-3)
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run SERP vs AI overlap (Module 3)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          PAPERS_DB_PATH: data/papers.db
        run: python -m src.cli collect serp

      - name: Run full collection
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          PAPERS_DB_PATH: data/papers.db
        run: python -m src.cli collect all

      - name: Generate statistical report
        env:
          PAPERS_DB_PATH: data/papers.db
        run: python -m src.cli analyze report

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: |
            data/papers.db
            output/*.png
          retention-days: 365
