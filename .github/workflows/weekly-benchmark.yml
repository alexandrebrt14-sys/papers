name: Weekly Benchmark + Analysis

on:
  schedule:
    - cron: '0 11 * * 0'  # domingo 08:00 BRT (UTC-3)
  workflow_dispatch:

concurrency:
  group: papers-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  PAPERS_DB_PATH: data/papers.db
  FINOPS_ALERT_EMAIL: ${{ secrets.FINOPS_ALERT_EMAIL }}

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      # NOTA (2026-06-11): papers.db NAO vem mais do git (saiu no #20/#21).
      # Continuidade = artifact (safety net) + R2 (source of truth), adotando
      # a base MAIOR — mesmo contrato do daily-collect.
      - name: Download previous DB (safety net)
        uses: dawidd6/action-download-artifact@v6
        with:
          name: papers-db-latest
          path: data/
          workflow_conclusion: ""
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Restore DB from Cloudflare R2 (source of truth)
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "$R2_ENDPOINT" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_BUCKET" ]; then
            echo "R2 secrets ausentes — usando apenas o artifact (skip silencioso)"
            exit 0
          fi
          pip install -q boto3
          python - <<'PY'
          import os, sqlite3, boto3
          from botocore.config import Config

          local = "data/papers.db"
          tmp = "data/_r2_latest.db"
          key = "papers/db/latest.db"

          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["R2_ENDPOINT"],
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
          )
          bucket = os.environ["R2_BUCKET"]

          try:
              s3.download_file(bucket, key, tmp)
          except Exception as e:
              print(f"R2 latest.db indisponivel ({e}) — mantendo artifact")
              raise SystemExit(0)

          def total_rows(path):
              if not os.path.exists(path):
                  return -1
              try:
                  con = sqlite3.connect(path)
                  cur = con.cursor()
                  total = 0
                  for (name,) in cur.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  ).fetchall():
                      try:
                          total += cur.execute(
                              f'SELECT COUNT(*) FROM "{name}"'
                          ).fetchone()[0]
                      except sqlite3.Error:
                          pass
                  con.close()
                  return total
              except sqlite3.Error:
                  return -1

          r_local = total_rows(local)
          r_r2 = total_rows(tmp)
          print(f"linhas artifact={r_local}  linhas R2={r_r2}")

          if r_r2 > r_local:
              os.replace(tmp, local)
              print(f"R2 e a base maior ({r_r2} linhas) — adotada como source of truth")
          else:
              if os.path.exists(tmp):
                  os.remove(tmp)
              print(f"Artifact >= R2 ({r_local} >= {r_r2}) — artifact mantido")
          PY
        continue-on-error: true

      - name: Validate Python imports
        run: python -c "from src.collectors.citation_tracker import CitationTracker; from src.finops.tracker import get_tracker; print('Import chain OK')"

      - name: Run SERP vs AI Overlap (Module 3) — all verticals
        run: |
          for v in fintech varejo saude tecnologia; do
            python -m src.cli --vertical $v collect serp || true
          done

      - name: Run citation + competitor collection — all verticals
        run: |
          for v in fintech varejo saude tecnologia; do
            python -m src.cli --vertical $v collect citation || true
            python -m src.cli --vertical $v collect competitor || true
          done

      - name: Generate statistical report
        run: |
          mkdir -p output/reports
          python -m src.cli analyze report > output/reports/weekly_$(date -u +%Y-%m-%d).txt 2>&1 || true

      - name: FinOps monitor cycle
        run: python -m src.cli finops monitor

      - name: Update documentation
        run: python scripts/update-docs.py

      - name: Upload database
        uses: actions/upload-artifact@v5
        with:
          name: papers-db-latest
          path: data/papers.db
          retention-days: 365
          overwrite: true

      - name: Upload reports + dashboard
        uses: actions/upload-artifact@v5
        with:
          name: weekly-report-${{ github.run_number }}
          path: |
            output/reports/
            output/finops_dashboard.html
          retention-days: 365

      - name: Enviar relatório semanal por email
        run: python scripts/send-report.py || true
        env:
          PAPERS_DB_PATH: data/papers.db
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FINOPS_ALERT_EMAIL: caramaschiai@caramaschiai.io

      - name: Commit data + docs + reports + finops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json data/daily_*.csv data/finops_checkpoint.json data/finops_alerts.jsonl 2>/dev/null || true
          git add output/ docs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem mudancas para commitar"
          else
            git commit -m "data: weekly benchmark + analysis $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
