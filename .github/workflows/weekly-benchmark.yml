name: Weekly Benchmark + Analysis

on:
  schedule:
    - cron: '0 11 * * 0'  # domingo 08:00 BRT (UTC-3)
  workflow_dispatch:

concurrency:
  group: papers-${{ github.workflow }}
  cancel-in-progress: true

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  PAPERS_DB_PATH: data/papers.db
  FINOPS_ALERT_EMAIL: ${{ secrets.FINOPS_ALERT_EMAIL }}

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Download previous DB
        uses: dawidd6/action-download-artifact@v6
        with:
          name: papers-db-latest
          path: data/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run SERP vs AI Overlap (Module 3) — all verticals
        run: |
          for v in fintech varejo saude tecnologia; do
            python -m src.cli --vertical $v collect serp || true
          done

      - name: Run full collection — all verticals
        run: |
          for v in fintech varejo saude tecnologia; do
            python -m src.cli --vertical $v collect all || true
          done

      - name: Generate statistical report
        run: |
          mkdir -p output/reports
          python -m src.cli analyze report > output/reports/weekly_$(date -u +%Y-%m-%d).txt 2>&1 || true

      - name: FinOps monitor cycle
        run: python -m src.cli finops monitor

      - name: Update documentation
        run: python scripts/update-docs.py

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: papers-db-latest
          path: data/papers.db
          retention-days: 365
          overwrite: true

      - name: Upload reports + dashboard
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: |
            output/reports/
            output/finops_dashboard.html
          retention-days: 365

      - name: Enviar relatório semanal por email
        run: python scripts/send-report.py || true
        env:
          PAPERS_DB_PATH: data/papers.db
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FINOPS_ALERT_EMAIL: caramaschiai@caramaschiai.io

      - name: Commit data + docs + reports + finops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ output/ docs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: weekly benchmark + analysis $(date -u +%Y-%m-%d)"
          git push
